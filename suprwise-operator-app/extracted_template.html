<script src="ac0f7e00-8903-4675-93a7-e697ddf8ed2f" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="1a247d4c-ca73-43e2-a56a-7831413fcaea"></script>
<script type="text/babel" src="0ff8de77-07e9-4ae5-8cc8-6b58497a808b"></script>
<script type="text/babel" src="e01872b4-da67-47a9-b021-8d72867668d3"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "#D98C2A",
  "density": "regular"
}/*EDITMODE-END*/;

function Frame({ children, label }) {
  return (
    <div data-screen-label={label} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>
      {children}
      <div style={{ fontSize: 12, color: '#8A8474', fontWeight: 600, letterSpacing: '0.04em' }}>{label}</div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('home');
  const [shiftActive, setShiftActive] = React.useState(false);
  const [shiftStart, setShiftStart] = React.useState(null);
  const [elapsed, setElapsed] = React.useState(0);
  const [attendance, setAttendance] = React.useState(false);

  // Live tick for shift timer
  React.useEffect(() => {
    if (!shiftActive || !shiftStart) return;
    const iv = setInterval(() => {
      setElapsed(Math.floor((Date.now() - shiftStart) / 1000));
    }, 1000);
    return () => clearInterval(iv);
  }, [shiftActive, shiftStart]);

  const startShift = () => {
    setShiftActive(true);
    // Show a realistic elapsed so the UI feels inhabited
    const fakeStart = Date.now() - 2 * 3600 * 1000 - 47 * 60 * 1000;
    setShiftStart(fakeStart);
    setElapsed(Math.floor((Date.now() - fakeStart) / 1000));
  };
  const endShift = () => {
    setShiftActive(false);
    setShiftStart(null);
    setElapsed(0);
  };

  const c = TOKENS[t.theme];
  const d = DENSITY[t.density];
  const accent = t.accent;

  // Scale to fit viewport
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const fit = () => {
      const vh = window.innerHeight;
      const vw = window.innerWidth;
      const s = Math.min(vw / 480, (vh - 40) / 920, 1);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  const go = (id) => setScreen(id);

  const renderScreen = () => {
    const props = { c, d, accent, go };
    if (screen === 'home') return <HomeScreen {...props} shiftActive={shiftActive} shiftElapsed={elapsed} onStartShift={startShift} onEndShift={endShift}/>;
    if (screen === 'shift') return <ShiftScreen {...props} shiftActive={shiftActive} shiftElapsed={elapsed} onStartShift={startShift} onEndShift={endShift}/>;
    if (screen === 'fuel') return <FuelScreen {...props}/>;
    if (screen === 'attendance') return <AttendanceScreen {...props} attendance={attendance} onMark={() => setAttendance(true)}/>;
    return null;
  };

  const dark = t.theme === 'dark';

  return (
    <>
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'center' }} data-screen-label={`Operator · ${screen}`}>
        <AndroidDevice width={440} height={900} dark={dark}>
          <div style={{
            minHeight: '100%',
            background: c.bg,
            color: c.ink,
            fontFamily: "'Inter', system-ui, sans-serif",
            position: 'relative',
          }}>
            {renderScreen()}
            <BottomNav active={screen} onChange={setScreen} c={c} accent={accent}/>
          </div>
        </AndroidDevice>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme"/>
        <TweakRadio label="Mode" value={t.theme} options={['light','dark']}
                    onChange={(v) => setTweak('theme', v)}/>
        <TweakColor label="Accent" value={t.accent}
                    onChange={(v) => setTweak('accent', v)}/>
        <div style={{ display: 'flex', gap: 6, marginTop: -2 }}>
          {['#D98C2A','#E09C4F','#C8502C','#4C8A6B','#3A6EA5','#8C5AC8'].map(col => (
            <button key={col} onClick={() => setTweak('accent', col)} style={{
              width: 24, height: 24, borderRadius: 6,
              background: col, border: t.accent === col ? '2px solid #29261b' : '1px solid rgba(0,0,0,0.1)',
              cursor: 'pointer', padding: 0,
            }}/>
          ))}
        </div>
        <TweakSection label="Layout"/>
        <TweakRadio label="Density" value={t.density} options={['compact','regular','comfy']}
                    onChange={(v) => setTweak('density', v)}/>
        <TweakSection label="State"/>
        <TweakToggle label="Shift active" value={shiftActive}
                     onChange={(v) => v ? startShift() : endShift()}/>
        <TweakToggle label="Marked attendance" value={attendance}
                     onChange={setAttendance}/>
        <TweakRadio label="Screen" value={screen}
                    options={[{value:'home',label:'Home'},{value:'shift',label:'Shift'},{value:'fuel',label:'Fuel'},{value:'attendance',label:'Me'}]}
                    onChange={setScreen}/>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>


</body></html>
